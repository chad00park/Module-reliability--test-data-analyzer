name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install matplotlib openpyxl tkinterdnd2 pyinstaller

      - name: Build EXE (size-optimized)
        run: >
          pyinstaller --onefile --windowed --name ModuleReliabilityAnalyzer
          --collect-all tkinterdnd2
          --exclude-module pandas
          --exclude-module scipy
          --exclude-module PIL.ImageQt
          --exclude-module PyQt5
          --exclude-module PyQt6
          --exclude-module PySide2
          --exclude-module PySide6
          --exclude-module IPython
          --exclude-module pytest
          --exclude-module matplotlib.tests
          --exclude-module numpy.tests
          module_reliability_analyzer.py

      - name: Report EXE size
        shell: pwsh
        run: |
          $f = Get-Item dist/ModuleReliabilityAnalyzer.exe
          $mb = [math]::Round($f.Length / 1MB, 1)
          echo "EXE size: $mb MB"
          if ($mb -gt 50) { echo "::warning::EXE exceeds 50MB target ($mb MB)" }

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ModuleReliabilityAnalyzer.exe -DestinationPath ModuleReliabilityAnalyzer.zip -Force
          $z = Get-Item ModuleReliabilityAnalyzer.zip
          echo ("ZIP size: " + [math]::Round($z.Length / 1MB, 1) + " MB")

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: ModuleReliabilityAnalyzer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
